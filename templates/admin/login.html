<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Clothyk</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); }
    .login-card { background: #fff; border-radius: 20px; padding: 48px 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { font-size: 2rem; font-weight: 900; color: var(--primary); }
    .login-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
    @media (max-width: 480px) { .login-card { padding: 32px 24px; margin: 16px; } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:2.5rem;margin-bottom:8px">👗</div>
      <h1>Clothyk Admin</h1>
      <p>Sign in to manage your store</p>
    </div>
    <div id="alert"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-control" id="username" type="text" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-control" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-lg btn-block" id="login-btn" onclick="doLogin()">Sign In →</button>
  </div>

  <div id="toast-container"></div>
  <script src="/static/js/shared.js"></script>
  <script>
    document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    async function doLogin() {
      const btn = document.getElementById("login-btn");
      btn.disabled = true; btn.textContent = "Signing in...";
      const alertEl = document.getElementById("alert");
      alertEl.innerHTML = "";

      try {
        await apiFetch("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value
          })
        });
        window.location = "/admin/dashboard";
      } catch(e) {
        alertEl.innerHTML = `<div class="alert alert-danger">⚠️ ${e.message || "Invalid credentials"}</div>`;
        btn.disabled = false; btn.textContent = "Sign In →";
        document.getElementById("password").value = "";
      }
    }
  </script>
</body>
</html>
