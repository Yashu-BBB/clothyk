<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Clothyk Admin</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="admin-layout">
  {% set active = 'dashboard' %}
  {% include 'admin/_sidebar.html' %}

  <div class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <span class="admin-topbar-title">Dashboard</span>
      </div>
      <a href="/" target="_blank" class="btn btn-outline btn-sm">🌐 View Store</a>
    </div>

    <div class="admin-content">
      <!-- Alert row -->
      <div id="alerts-row"></div>

      <!-- Stat Cards -->
      <div class="stat-grid" id="stat-cards">
        <div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value skeleton" style="height:36px;width:80px"></div></div>
        <div class="stat-card green"><div class="stat-label">Orders Today</div><div class="stat-value skeleton" style="height:36px;width:60px"></div></div>
        <div class="stat-card amber"><div class="stat-label">Revenue Today</div><div class="stat-value skeleton" style="height:36px;width:100px"></div></div>
        <div class="stat-card green"><div class="stat-label">Profit Today</div><div class="stat-value skeleton" style="height:36px;width:80px"></div></div>
      </div>

      <!-- Recent Orders -->
      <div class="page-header" style="margin-bottom:16px">
        <h2>📦 Recent Orders</h2>
        <a href="/admin/orders" class="btn btn-outline btn-sm">View All</a>
      </div>
      <div class="table-wrap" style="margin-bottom:32px">
        <table id="recent-orders-table">
          <thead><tr><th>Order ID</th><th>Customer</th><th>Product</th><th>Amount</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
          <tbody id="recent-orders-body">
            <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Alerts -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" id="alert-panels">
        <div>
          <h3 style="font-weight:700;margin-bottom:12px">⚠️ Low Stock</h3>
          <div id="low-stock-list"></div>
        </div>
        <div>
          <h3 style="font-weight:700;margin-bottom:12px">💸 Refunds Pending</h3>
          <div id="refund-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/shared.js"></script>
<script>
const STATUS_COLORS = { pending:'warning', confirmed:'primary', shipped:'primary', delivered:'success', cancelled:'danger', refunded:'muted' };

async function loadDashboard() {
  try {
    const data = await apiFetch("/api/admin/dashboard-data");

    // Stat cards
    document.getElementById("stat-cards").innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value">${data.total_products}</div></div>
      <div class="stat-card green"><div class="stat-label">Orders Today</div><div class="stat-value">${data.orders_today}</div></div>
      <div class="stat-card amber"><div class="stat-label">Revenue Today</div><div class="stat-value">${formatPrice(data.revenue_today)}</div></div>
      <div class="stat-card green"><div class="stat-label">Profit Today</div><div class="stat-value">${formatPrice(data.profit_today)}</div></div>
    `;

    // Recent orders
    const body = document.getElementById("recent-orders-body");
    if (!data.recent_orders.length) {
      body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">No orders yet</td></tr>';
    } else {
      body.innerHTML = data.recent_orders.map(o => `
        <tr>
          <td style="font-family:monospace;font-size:0.8rem">${o.id.slice(0,8)}...</td>
          <td><strong>${o.customer_name}</strong><br><span style="color:var(--muted);font-size:0.8rem">${o.customer_phone}</span></td>
          <td>${o.product_name}<br><span style="color:var(--muted);font-size:0.8rem">${o.size} · ${o.color}</span></td>
          <td><strong>${formatPrice(o.our_price)}</strong><br><span style="color:var(--success);font-size:0.8rem">+${formatPrice(o.profit)}</span></td>
          <td><span class="badge badge-${o.payment_type === 'upi' ? 'primary' : 'warning'}">${o.payment_type?.toUpperCase()}</span></td>
          <td><span class="badge badge-${STATUS_COLORS[o.status] || 'muted'}">${o.status}</span></td>
          <td style="font-size:0.8rem;color:var(--muted)">${new Date(o.created_at).toLocaleDateString('en-IN')}</td>
        </tr>
      `).join("");
    }

    // Low stock
    const lowStockEl = document.getElementById("low-stock-list");
    const outEl = data.out_of_stock || [];
    const lowEl = data.low_stock || [];
    if (!outEl.length && !lowEl.length) {
      lowStockEl.innerHTML = '<p style="color:var(--success)">✅ All products in stock</p>';
    } else {
      lowStockEl.innerHTML = [
        ...outEl.map(p => `<div style="display:flex;justify-content:space-between;padding:8px 12px;background:#FEE2E2;border-radius:8px;margin-bottom:6px"><span>${p.name}</span><span class="badge badge-danger">OUT</span></div>`),
        ...lowEl.map(p => `<div style="display:flex;justify-content:space-between;padding:8px 12px;background:#FEF3C7;border-radius:8px;margin-bottom:6px"><span>${p.name}</span><span class="badge badge-warning">${p.stock} left</span></div>`)
      ].join("");
    }

    // Refunds
    const refundEl = document.getElementById("refund-list");
    if (!data.refund_pending.length) {
      refundEl.innerHTML = '<p style="color:var(--success)">✅ No pending refunds</p>';
    } else {
      refundEl.innerHTML = data.refund_pending.map(o => `
        <div style="padding:8px 12px;background:#FEF3C7;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between">
          <span>${o.customer_name} — ${o.product_name}</span>
          <strong>${formatPrice(o.our_price)}</strong>
        </div>
      `).join("");
    }

    // Top alerts
    const alerts = [];
    if (outEl.length) alerts.push(`<div class="alert alert-danger">⚠️ ${outEl.length} product(s) out of stock!</div>`);
    if (data.refund_pending.length) alerts.push(`<div class="alert alert-warning">💸 ${data.refund_pending.length} refund(s) pending</div>`);
    document.getElementById("alerts-row").innerHTML = alerts.join("");
  } catch(e) {
    showToast("Failed to load dashboard: " + e.message, "error");
  }
}

async function logout() {
  await apiFetch("/api/auth/logout", { method: "POST" });
  window.location = "/admin/login";
}

loadDashboard();
</script>
</body>
</html>
