<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — Clothyk</title>
  <link rel="stylesheet" href="/static/css/shared.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">👗 Clothyk</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/products">Shop</a>
      <a href="/wishlist">Wishlist</a>
    </div>
    <div class="nav-actions">
      <button class="nav-icon-btn" onclick="window.location='/wishlist'">❤️ <span id="wishlist-badge" class="nav-badge" style="display:none">0</span></button>
      <button class="nav-icon-btn" onclick="window.location='/cart'">🛍️ <span id="cart-badge" class="nav-badge" style="display:none">0</span></button>
    </div>
  </nav>

  <div class="container" style="padding-top:32px;padding-bottom:64px">
    <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:8px">❤️ Your Wishlist</h1>
    <p style="color:var(--muted);margin-bottom:32px">Items you've saved for later</p>

    <div id="empty-wishlist" style="display:none;text-align:center;padding:64px">
      <div style="font-size:4rem;margin-bottom:16px">💔</div>
      <h2>Your wishlist is empty</h2>
      <p style="color:var(--muted);margin-bottom:24px">Save items you like and come back later</p>
      <a href="/products" class="btn btn-primary btn-lg">Browse Products</a>
    </div>

    <div id="wishlist-grid" class="product-grid"></div>
  </div>

  <div id="toast-container"></div>
  <script src="/static/js/shared.js"></script>
  <script>
    function renderWishlist() {
      const items = Wishlist.get();
      const grid = document.getElementById("wishlist-grid");
      const empty = document.getElementById("empty-wishlist");

      if (!items.length) {
        grid.style.display = "none";
        empty.style.display = "block";
        return;
      }
      grid.style.display = "grid";
      empty.style.display = "none";

      grid.innerHTML = items.map(item => `
        <div class="product-card">
          <img src="${item.image || '/static/images/placeholder.svg'}" alt="${item.name}" onclick="window.location='/product/${item.id}'" style="cursor:pointer">
          <div class="product-card-body">
            <div class="product-card-name">${item.name}</div>
            <div class="product-card-price">${formatPrice(item.price)}</div>
            <div class="product-card-code">${item.code || ''}</div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button class="btn btn-primary btn-sm" style="flex:1" onclick="moveToCart('${item.id}')">Move to Cart</button>
              <button class="btn btn-danger btn-sm" onclick="removeFromWishlist('${item.id}')">✕</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function moveToCart(id) {
      try {
        const product = await apiFetch(`/api/products/${id}`);
        const sizes = Array.isArray(product.sizes) ? product.sizes : JSON.parse(product.sizes || "[]");
        const colors = Array.isArray(product.colors) ? product.colors : JSON.parse(product.colors || "[]");
        Cart.add(product, sizes[0] || "Free Size", colors[0] || "Default");
        showToast("Moved to cart! 🛍️");
      } catch(e) {
        showToast("Failed to move to cart", "error");
      }
    }

    function removeFromWishlist(id) {
      const items = Wishlist.get().filter(i => i.id !== id);
      Wishlist.save(items);
      renderWishlist();
      showToast("Removed from wishlist", "warning");
    }

    renderWishlist();
  </script>
</body>
</html>
