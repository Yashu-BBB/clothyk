<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Clothyk</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <style>
    .page-header-bar {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
      padding: 32px 24px;
      text-align: center;
    }
    .page-header-bar h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
    .page-header-bar p { opacity: .8; }

    .gender-tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 64px;
      z-index: 50;
    }
    .gender-tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 1rem;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: all .2s;
    }
    .gender-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: #FAF8FF;
    }

    .filters-bar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      background: #fff; padding: 16px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 114px; z-index: 40;
    }
    .filters-bar input { flex: 1; min-width: 180px; }

    .cats-scroll {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 12px 0; scrollbar-width: none;
    }
    .cats-scroll::-webkit-scrollbar { display: none; }
    .cat-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 16px; border-radius: 999px;
      border: 2px solid var(--border);
      background: #fff; cursor: pointer;
      font-size: 0.85rem; font-weight: 600;
      white-space: nowrap; transition: all .2s;
      flex-shrink: 0;
    }
    .cat-pill:hover { border-color: var(--primary); color: var(--primary); }
    .cat-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .results-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; color: var(--muted); font-size: 0.9rem;
    }
    .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); grid-column: 1/-1; }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">👗 Clothyk</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/products?gender=Girls">Girls</a>
      <a href="/products?gender=Boys">Boys</a>
      <a href="/wishlist">Wishlist</a>
    </div>
    <div class="nav-actions">
      <button class="nav-icon-btn" onclick="window.location='/wishlist'">❤️ <span id="wishlist-badge" class="nav-badge" style="display:none">0</span></button>
      <button class="nav-icon-btn" onclick="window.location='/cart'">🛍️ <span id="cart-badge" class="nav-badge" style="display:none">0</span></button>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header-bar">
    <h1 id="page-title">👗 Shop All</h1>
    <p>Handpicked styles from local boutiques</p>
  </div>

  <!-- Gender Tabs -->
  <div class="gender-tabs">
    <button class="gender-tab" id="tab-Girls" onclick="switchGender('Girls')">👗 Girls</button>
    <button class="gender-tab" id="tab-Boys" onclick="switchGender('Boys')">👕 Boys</button>
  </div>

  <div class="container" style="padding-top:20px;padding-bottom:64px">
    <!-- Search & Sort -->
    <div class="filters-bar" style="position:relative;top:0;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px">
      <input class="form-control" type="search" id="search" placeholder="🔍 Search..." style="flex:1">
      <select class="form-control" id="sort" style="min-width:160px">
        <option value="">Latest First</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
      </select>
    </div>

    <!-- Category Pills -->
    <div class="cats-scroll" id="cat-pills"></div>

    <!-- Results -->
    <div class="results-bar">
      <span id="results-info"></span>
    </div>
    <div class="product-grid" id="products-grid"></div>
  </div>

  <footer>
    <p style="opacity:.7">© 2024 Clothyk. Trendy fashion across India 🇮🇳</p>
  </footer>

  <div id="toast-container"></div>
  <script src="/static/js/shared.js"></script>
  <script>
    let currentGender = 'Girls';
    let currentCat = null;
    let debounceTimer;

    const urlParams = new URLSearchParams(location.search);
    const urlGender = urlParams.get('gender');
    const urlCat = urlParams.get('category');

    async function init() {
      if (urlGender === 'Boys') {
        currentGender = 'Boys';
      }
      if (urlCat) currentCat = urlCat;
      updateGenderUI();
      await loadCategories();
      await loadProducts();
    }

    function updateGenderUI() {
      document.getElementById('tab-Girls').classList.toggle('active', currentGender === 'Girls');
      document.getElementById('tab-Boys').classList.toggle('active', currentGender === 'Boys');
      document.getElementById('page-title').textContent = currentGender === 'Girls' ? '👗 Girls Collection' : '👕 Boys Collection';
    }

    async function loadCategories() {
      try {
        const cats = await apiFetch(`/api/categories/?gender=${currentGender}`);
        const pills = document.getElementById('cat-pills');
        pills.innerHTML = `
          <div class="cat-pill ${!currentCat ? 'active' : ''}" onclick="selectCat(null, this)">
            ✨ All
          </div>
        `;
        cats.forEach(cat => {
          const pill = document.createElement('div');
          pill.className = `cat-pill ${currentCat === cat.name ? 'active' : ''}`;
          pill.innerHTML = `${cat.icon} ${cat.name}`;
          pill.onclick = () => selectCat(cat.name, pill);
          pills.appendChild(pill);
        });
      } catch(e) {}
    }

    function selectCat(name, el) {
      currentCat = name;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      loadProducts();
    }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      skeletonCards(grid, 8);

      const search = document.getElementById('search').value;
      const sort = document.getElementById('sort').value;

      const params = new URLSearchParams();
      params.set('gender', currentGender);
      if (search) params.set('search', search);
      if (currentCat) params.set('category', currentCat);
      if (sort) params.set('sort', sort);

      try {
        const products = await apiFetch(`/api/products/?${params}`);
        document.getElementById('results-info').textContent = `${products.length} product${products.length !== 1 ? 's' : ''} found`;

        if (!products.length) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="emoji">🔍</div>
              <h3>No products found</h3>
              <p>Try different filters or check back later</p>
            </div>`;
          return;
        }
        grid.innerHTML = products.map(p => renderProductCard(p)).join('');
      } catch(e) {
        grid.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Failed to load. Try again.</p></div>`;
      }
    }

    function switchGender(gender) {
      currentGender = gender;
      currentCat = null;
      updateGenderUI();
      loadCategories();
      loadProducts();
    }

    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadProducts, 400);
    });
    document.getElementById('sort').addEventListener('change', loadProducts);

    init();
  </script>
</body>
</html>
