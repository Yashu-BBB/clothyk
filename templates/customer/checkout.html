<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Clothyk</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; padding: 40px 0 64px; }
    .checkout-form-card { background: #fff; border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); }
    .order-summary-card { background: #fff; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); position: sticky; top: 80px; }
    .order-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .order-item img { width: 60px; height: 74px; object-fit: cover; border-radius: 8px; }
    .order-item-info { flex: 1; }
    .order-item-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .order-item-meta { color: var(--muted); font-size: 0.8rem; }
    .order-item-price { font-weight: 700; color: var(--primary); }
    .summary-total { display: flex; justify-content: space-between; padding: 16px 0 0; font-weight: 800; font-size: 1.15rem; color: var(--primary); }
    @media (max-width: 900px) { .checkout-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">👗 Clothyk</a>
    <div class="nav-actions">
      <button class="nav-icon-btn" onclick="window.location='/cart'">🛍️ <span id="cart-badge" class="nav-badge" style="display:none">0</span></button>
    </div>
  </nav>

  <div class="container">
    <div id="empty-cart-msg" style="display:none;text-align:center;padding:80px 24px">
      <div style="font-size:3rem;margin-bottom:12px">🛒</div>
      <h2>Your cart is empty</h2>
      <a href="/products" class="btn btn-primary" style="margin-top:16px">Browse Products</a>
    </div>

    <div class="checkout-layout" id="checkout-layout">
      <!-- Form -->
      <div class="checkout-form-card">
        <h2 style="font-weight:800;margin-bottom:24px">📋 Delivery Details</h2>
        <div id="form-alert"></div>
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-control" id="customer_name" placeholder="Your full name" required>
          <div class="form-error" id="err-name"></div>
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp / Phone Number *</label>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="background:#f3f0ff;border:2px solid var(--border);padding:10px 12px;border-radius:8px;font-weight:600;white-space:nowrap">🇮🇳 +91</span>
            <input class="form-control" id="customer_phone" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric">
          </div>
          <div class="form-error" id="err-phone"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Complete Address *</label>
          <textarea class="form-control" id="customer_address" rows="3" placeholder="House/Flat No., Street, Area, Landmark"></textarea>
          <div class="form-error" id="err-address"></div>
        </div>
        <div class="form-group">
          <label class="form-label">City *</label>
          <input class="form-control" id="customer_city" placeholder="Your city">
          <div class="form-error" id="err-city"></div>
        </div>

        <!-- Turnstile CAPTCHA -->
        <div class="form-group">
          <div class="cf-turnstile" data-sitekey="0x4AAAAAADrUAQmH1f5HqXtJ" id="turnstile-widget"></div>
        </div>

        <button class="btn btn-success btn-lg btn-block" onclick="placeOrder()" id="order-btn">
          💬 Order via WhatsApp
        </button>
        <p style="color:var(--muted);font-size:0.8rem;text-align:center;margin-top:12px">
          You'll be redirected to WhatsApp to complete payment · UPI or Cash on Delivery
        </p>
      </div>

      <!-- Order Summary -->
      <div class="order-summary-card">
        <h3 style="font-weight:800;margin-bottom:16px">🛍️ Order Summary</h3>
        <div id="summary-items"></div>
        <div class="summary-total">
          <span>Total</span>
          <span id="summary-total"></span>
        </div>
        <a href="/cart" style="display:block;text-align:center;color:var(--primary);font-size:0.85rem;margin-top:12px;font-weight:600">← Edit Cart</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/static/js/shared.js"></script>
  <script>
    const WA_NUMBER = "YOUR_WA_NUMBER"; // fallback

    function renderSummary() {
      const items = Cart.get();
      if (!items.length) {
        document.getElementById("checkout-layout").style.display = "none";
        document.getElementById("empty-cart-msg").style.display = "block";
        return;
      }
      document.getElementById("summary-items").innerHTML = items.map(item => `
        <div class="order-item">
          <img src="${item.image || '/static/images/placeholder.svg'}" alt="${item.name}">
          <div class="order-item-info">
            <div class="order-item-name">${item.name}</div>
            <div class="order-item-meta">Size: ${item.size} · Color: ${item.color} · Qty: ${item.qty || 1}</div>
          </div>
          <div class="order-item-price">${formatPrice(item.price * (item.qty || 1))}</div>
        </div>
      `).join("");
      document.getElementById("summary-total").textContent = formatPrice(Cart.total());
    }

    function validate() {
      let ok = true;
      const name = document.getElementById("customer_name").value.trim();
      const phone = document.getElementById("customer_phone").value.trim();
      const address = document.getElementById("customer_address").value.trim();
      const city = document.getElementById("customer_city").value.trim();

      document.querySelectorAll(".form-error").forEach(e => e.textContent = "");
      document.querySelectorAll(".form-control").forEach(e => e.classList.remove("error"));

      if (!name) { showError("customer_name", "err-name", "Name is required"); ok = false; }
      if (!/^\d{10}$/.test(phone)) { showError("customer_phone", "err-phone", "Enter valid 10-digit number"); ok = false; }
      if (!address || address.length < 10) { showError("customer_address", "err-address", "Enter complete address"); ok = false; }
      if (!city) { showError("customer_city", "err-city", "City is required"); ok = false; }

      return ok;
    }

    function showError(fieldId, errId, msg) {
      document.getElementById(fieldId)?.classList.add("error");
      document.getElementById(errId).textContent = msg;
    }

    async function placeOrder() {
      if (!validate()) return;

      const items = Cart.get();
      if (!items.length) { showToast("Cart is empty", "error"); return; }

      const captchaToken = document.querySelector('[name=cf-turnstile-response]')?.value || "";

      const btn = document.getElementById("order-btn");
      btn.disabled = true;
      btn.textContent = "⏳ Placing order...";

      // For multi-item carts, we create orders per item
      // (Each product in Clothyk is unique - one sold = removed)
      const item = items[0]; // Primary item

      const orderData = {
        customer_name: document.getElementById("customer_name").value.trim(),
        customer_phone: document.getElementById("customer_phone").value.trim(),
        customer_address: document.getElementById("customer_address").value.trim(),
        customer_city: document.getElementById("customer_city").value.trim(),
        product_id: item.id,
        size: item.size,
        color: item.color,
        captcha_token: captchaToken
      };

      try {
        const result = await apiFetch("/api/orders/create", {
          method: "POST",
          body: JSON.stringify(orderData)
        });

        // Clear cart
        Cart.clear();

        // Open WhatsApp with pre-filled message
        const adminPhone = result.admin_phone;
        const waMsg = encodeURIComponent(result.whatsapp_message);
        const waUrl = `https://wa.me/${adminPhone}?text=${waMsg}`;
        showToast("Order placed! Opening WhatsApp... 🎉", "success");
        setTimeout(() => { window.open(waUrl, "_blank"); }, 1000);
        setTimeout(() => { window.location = "/"; }, 2500);
      } catch(e) {
        showToast(e.message || "Failed to place order", "error");
        btn.disabled = false;
        btn.textContent = "💬 Order via WhatsApp";
      }
    }

    renderSummary();
  </script>
</body>
</html>
